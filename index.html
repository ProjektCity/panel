<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://projektcity.com/assets/images/logos/favicon-f.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Projekt City Panel</title>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&family=Roboto&display=swap">
    <script src="https://kit.fontawesome.com/808e37ed2f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://projektcity.com/assets/global/footer.css">
    <link rel="stylesheet" href="https://projektcity.com/assets/global/header.css">
    <link rel="stylesheet" href="assets/main.css">
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="https://projektcity.com/assets/global/variables.css">
</head>
<body>
    <header></header>
    <main>
        <section>
            <div class="page-header">
                <h1>Dashboard</h1>
                <p>Overview of downloads, tasks and recent activity.</p>
            </div>
            <div class="stats-grid">
                <button class="btn btn-outline btn-secondary">
                    <i class="fa-solid fa-up-right-from-square"></i>
                    <a class="linkout" href="https://authors.curseforge.com/#/projects/782396/files/create">Upload</a>
                </button>
                <button class="btn btn-outline btn-secondary">
                    <i class="fa-solid fa-up-right-from-square"></i>
                    <a class="linkout" href="https://authors.curseforge.com/#/projects/782396/general">Authors CF</a>
                </button>
                <button class="btn btn-outline btn-secondary">
                    <i class="fas fa-upload"></i>
                    <a class="linkout" href="https://www.curseforge.com/minecraft/worlds/projekt-city">Project Page</a>
                </button>
            </div>
            <div class="stats-grid">
                <div class="stat-card accent">
                    <div class="stat-icon"><i class="fa-solid fa-download"></i></div>
                    <div class="stat-label">Total Downloads</div>
                    <div id="stat-downloads" class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-list-check"></i></div>
                    <div class="stat-label">Total Tasks</div>
                    <div id="stat-total" class="stat-value">0</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-icon"><i class="fa-solid fa-hourglass-half"></i></div>
                    <div class="stat-label">Open Tasks</div>
                    <div id="stat-open" class="stat-value">0</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
                    <div class="stat-label">Done Tasks</div>
                    <div id="stat-done" class="stat-value">0</div>
                </div>
            </div>
            <div class="activity-grid">
                <div class="card">
                    <div class="card-title"><i class="fa-solid fa-list-check"></i> &nbsp;Recent Tasks</div>
                    <div id="recent-tasks"><div class="loading-pulse">Loading…</div></div>
                </div>
                <div class="card">
                    <div class="card-title"><i class="fa-solid fa-inbox"></i> &nbsp;Recent Submissions</div>
                    <div id="recent-forms"><div class="loading-pulse">Loading…</div></div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div id="modal-title" class="modal-title"></div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
                <button id="modal-confirm" class="btn btn-primary">Confirm</button>
            </div>
        </div>
    </div>
    <script src="/assets/api.js"></script>
    <script src="/assets/auth.js"></script>
    <script src="/assets/ui.js"></script>
    <script src="/assets/app.js"></script>
    <script src="/assets/footer.js"></script>
    <script src="/assets/header.js"></script>
</body>
</html>
